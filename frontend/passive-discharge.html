<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>被动放电 WCCA 分析</title>
  <style>
    :root {
      --primary: #1e3a8a;
      --primary-light: #2563eb;
      --bg: #f0f2f5;
      --card-bg: #fff;
      --text: #222;
      --border: #e5e7eb;
      --expert-bg: #f0f4ff;
      --user-bg: #e8f5e9;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== 顶栏 ===== */
    header {
      height: 54px;
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 14px;
      flex-shrink: 0;
    }
    header .logo { font-size: 18px; font-weight: 700; }
    header .sep { color: rgba(255,255,255,0.3); }
    header .subtitle { font-size: 13px; opacity: 0.8; }
    .btn-back {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 13px;
      padding: 5px 12px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 6px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-back:hover { background: rgba(255,255,255,0.1); }
    .status-badge {
      margin-left: auto;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.15);
    }
    .status-badge.connected { background: #22c55e55; }

    /* ===== 主体布局 ===== */
    .page-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 聊天区域 */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .chat-area .welcome {
      text-align: center;
      padding: 40px 20px;
      color: #888;
    }
    .chat-area .welcome .welcome-icon { font-size: 48px; margin-bottom: 12px; }

    /* 消息气泡 */
    .msg {
      max-width: 80%;
      display: flex;
      gap: 10px;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.expert { align-self: flex-start; }
    .msg .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .msg.expert .avatar { background: #dbe4ff; }
    .msg.user .avatar { background: #c8e6c9; }
    .msg .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
    }
    .msg.expert .bubble { background: var(--expert-bg); border: 1px solid #d4ddf8; }
    .msg.user .bubble { background: var(--user-bg); border: 1px solid #c8e6c9; }
    .msg .bubble pre {
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 12px;
      margin: 8px 0;
    }
    .msg .bubble code { font-size: 12px; }

    /* 文件上传气泡 */
    .file-attachment {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      background: #fff;
      border: 1px dashed #ccc;
      margin-top: 6px;
      font-size: 13px;
    }

    /* 底部输入区 */
    .input-area {
      padding: 14px 24px;
      background: #fff;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input-row textarea {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      rows: 2;
      min-height: 44px;
      max-height: 120px;
      transition: border-color 0.2s;
    }
    .input-row textarea:focus { border-color: var(--primary-light); }
    .btn-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn-icon:hover { background: #f5f5f5; }
    .btn-send {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--primary-light);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .btn-send:hover { opacity: 0.85; }
    .btn-send:disabled { background: #bbb; cursor: not-allowed; }
    .input-hint {
      font-size: 11px;
      color: #aaa;
      margin-top: 6px;
      text-align: center;
    }
    #file-input { display: none; }

    /* 打字指示器 */
    .typing-indicator {
      align-self: flex-start;
      display: flex;
      gap: 4px;
      padding: 10px 16px;
      background: var(--expert-bg);
      border-radius: 14px;
      border: 1px solid #d4ddf8;
    }
    .typing-indicator span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #a0b4e0;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* 响应式 */
    @media (max-width: 600px) {
      .msg { max-width: 92%; }
      header { padding: 0 12px; }
      .input-area { padding: 10px 12px; }
    }
  </style>
</head>
<body>

<header>
  <a href="/agent/wcca-circuit" class="btn-back">← 返回电路选择</a>
  <span class="sep">|</span>
  <span class="logo">被动放电 WCCA 分析</span>
  <span class="subtitle">· 专家引导式分析</span>
  <span class="status-badge" id="status-badge">在线</span>
</header>

<div class="page-body">
  <div class="chat-area" id="chat-area">
    <div class="welcome">
      <div class="welcome-icon">⚡</div>
      <p>正在连接 WCCA 专家…</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <button class="btn-icon" onclick="document.getElementById('file-input').click()" title="上传文件 (BOM/原理图)">📎</button>
      <input type="file" id="file-input" accept=".xlsx,.xls,.jpg,.jpeg,.png,.pdf" onchange="uploadFile(this)">
      <textarea id="user-input" placeholder="输入消息… (Enter 发送, Shift+Enter 换行)" rows="2" onkeydown="onKeyDown(event)"></textarea>
      <button class="btn-send" id="btn-send" onclick="sendMessage()">➤</button>
    </div>
    <div class="input-hint">上传 BOM 表格 或 电路原理图，专家会引导你完成分析</div>
  </div>
</div>

<script>
  const chatArea = document.getElementById("chat-area");
  const userInput = document.getElementById("user-input");
  const btnSend = document.getElementById("btn-send");
  const statusBadge = document.getElementById("status-badge");
  let messages = [];  // API 格式的对话历史
  let isStreaming = false;

  // ===== 初始化：发送问候 =====
  (async function init() {
    messages = [{ role: "user", content: "你好" }];
    await streamExpertReply(messages);
  })();

  // ===== 发送消息 =====
  async function sendMessage() {
    if (isStreaming) return;
    const text = userInput.value.trim();
    if (!text) return;

    userInput.value = "";
    userInput.style.height = "auto";
    btnSend.disabled = true;

    // 显示用户消息
    appendMessage("user", text);
    messages.push({ role: "user", content: text });

    await streamExpertReply(messages);
    btnSend.disabled = false;
    userInput.focus();
  }

  // ===== 流式获取专家回复 =====
  async function streamExpertReply(msgs) {
    isStreaming = true;
    const typingEl = showTyping();

    try {
      const formData = new FormData();
      formData.append("messages", JSON.stringify(msgs));

      const resp = await fetch("/api/wcca/chat", {
        method: "POST",
        body: formData,
      });

      if (!resp.ok) {
        removeTyping(typingEl);
        appendMessage("expert", "⚠️ 服务暂时不可用，请稍后重试。");
        return;
      }

      // 创建专家回复气泡并流式更新
      const bubbleEl = createStreamingBubble();
      removeTyping(typingEl);

      let fullText = "";
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop() || "";

        for (const line of lines) {
          if (line.startsWith("data: ")) {
            const dataStr = line.slice(6);
            if (dataStr === "[DONE]") continue;
            try {
              const data = JSON.parse(dataStr);
              if (data.text) {
                fullText += data.text;
                bubbleEl.innerHTML = renderMarkdown(fullText);
                chatArea.scrollTop = chatArea.scrollHeight;
              }
            } catch (e) { /* skip bad JSON */ }
          }
        }
      }

      // 检查是否包含参数 JSON
      const paramsData = parseParamsFromText(fullText);
      if (paramsData && paramsData.ready) {
        messages.push({ role: "assistant", content: fullText });
        // 自动触发计算
        setTimeout(async () => {
          appendMessage("expert", "正在执行 WCCA 计算…");
          await runCalculation(paramsData.params);
        }, 800);
      } else {
        messages.push({ role: "assistant", content: fullText });
      }
    } catch (e) {
      removeTyping(typingEl);
      appendMessage("expert", `⚠️ 连接失败: ${e.message}`);
    } finally {
      isStreaming = false;
    }
  }

  // ===== 文件上传 =====
  async function uploadFile(input) {
    const file = input.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append("file", file);

    // 显示上传中
    appendMessage("user", `📎 已上传: ${file.name} (${formatSize(file.size)})`);
    messages.push({ role: "user", content: `[上传了文件: ${file.name}]` });

    try {
      const resp = await fetch("/api/wcca/upload", { method: "POST", body: formData });
      const result = await resp.json();

      if (result.summary && result.summary.columns) {
        // BOM 文件，发送解析结果给专家
        const bomInfo = `[BOM 文件已上传: ${file.name}]\n解析结果: ${result.summary.rows} 行数据, 列: ${result.summary.columns.join(", ")}\n前几行预览:\n${JSON.stringify(result.summary.preview?.slice(0, 10), null, 2)}`;
        messages.push({ role: "user", content: bomInfo });
        appendMessage("expert", `✅ 已收到 BOM 文件「${file.name}」，共 ${result.summary.rows} 行。专家正在分析…`);
      } else if (file.name.match(/\.(jpg|jpeg|png|pdf)$/i)) {
        appendMessage("expert", `✅ 已收到原理图「${file.name}」，专家正在查看…`);
        messages.push({ role: "user", content: `[上传了原理图文件: ${file.name}, ${formatSize(file.size)}]` });
      } else {
        messages.push({ role: "user", content: `[上传了文件: ${file.name}, ${formatSize(file.size)}]` });
      }

      await streamExpertReply(messages);
    } catch (e) {
      appendMessage("expert", `⚠️ 文件上传失败: ${e.message}`);
    }

    input.value = "";
  }

  // ===== 执行 WCCA 计算 =====
  async function runCalculation(params) {
    try {
      statusBadge.textContent = "计算中…";
      const resp = await fetch("/api/wcca/calculate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(params),
      });
      const result = await resp.json();

      if (result.error) {
        appendMessage("expert", `⚠️ 计算出错: ${result.error}`);
        return;
      }

      // 格式化结果
      let report = "## 📊 WCCA 计算结果\n\n";
      report += `**母线电压**: ${result.V_HVDC_typ}V | **安全电压**: ${result.V_Safety}V | **温度范围**: ${result.T_min}°C ~ ${result.T_max}°C\n`;
      report += `**电容反推值**: ${(result.Cap_HVDC_typ * 1e6).toFixed(3)} μF | **ln(Vs/Vh)**: ${result.ln_ratio}\n\n`;

      for (const cr of result.config_results) {
        const passIcon = (cr.t_passed && cr.P_passed) ? "✅" : "❌";
        report += `### ${passIcon} ${cr.config_name}\n`;
        report += `| 项目 | 值 | 判定 |\n|------|-----|------|\n`;
        report += `| 放电时间 (典型) | **${cr.t_discharge_typ}s** | — |\n`;
        report += `| 放电时间 (最坏) | **${cr.t_discharge_max}s** | ${cr.t_passed ? "✅ ≤120s" : "❌ >120s"} |\n`;
        report += `| 单颗功耗 (最坏) | **${cr.P_single_max}W** | ${cr.P_passed ? `✅ <${cr.P_derate_target}W` : `❌ ≥${cr.P_derate_target}W`} |\n`;
        report += `| 总功耗 | ${cr.P_all_max}W | — |\n`;
        report += `| 等效并联电阻 (max) | ${(cr.R_parallel_max/1000).toFixed(2)}kΩ | — |\n\n`;
      }

      report += result.all_t_pass && result.all_P_pass
        ? "## ✅ 综合结论: 全部通过"
        : "## ⚠️ 综合结论: 存在不通过项，请检查参数";

      appendMessage("expert", report);
      messages.push({ role: "assistant", content: report });
      statusBadge.textContent = "计算完成";
      statusBadge.classList.add("connected");
    } catch (e) {
      appendMessage("expert", `⚠️ 计算请求失败: ${e.message}`);
    }
  }

  // ===== UI 工具函数 =====
  function appendMessage(role, text) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    const avatar = role === "expert" ? "👨‍🔬" : "👤";
    div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${renderMarkdown(text)}</div>`;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showTyping() {
    const el = document.createElement("div");
    el.className = "msg expert";
    el.innerHTML = `<div class="avatar">👨‍🔬</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
    chatArea.appendChild(el);
    chatArea.scrollTop = chatArea.scrollHeight;
    return el;
  }

  function removeTyping(el) { if (el && el.parentNode) el.remove(); }

  function createStreamingBubble() {
    const div = document.createElement("div");
    div.className = "msg expert";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    div.innerHTML = '<div class="avatar">👨‍🔬</div>';
    div.appendChild(bubble);
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return bubble;
  }

  function parseParamsFromText(text) {
    const m = text.match(/```json\s*([\s\S]*?)\s*```/);
    if (!m) return null;
    try { return JSON.parse(m[1]); } catch (e) { return null; }
  }

  function renderMarkdown(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.*?)\*/g, "<em>$1</em>")
      .replace(/^### (.*$)/gm, "<h4>$1</h4>")
      .replace(/^## (.*$)/gm, "<h3>$1</h3>")
      .replace(/^# (.*$)/gm, "<h2>$1</h2>")
      .replace(/\|(.+)\|/g, (match) => {
        const cells = match.split("|").filter(c => c.trim());
        if (cells.every(c => c.match(/^[-:]+$/))) return ""; // skip separator
        const tag = match.includes("---") ? "" : "";
        return `<tr>${cells.map(c => match === text.split("\n").find(l => l.includes("|") && !l.match(/^[-| ]+$/)) ? `<th>${c.trim()}</th>` : `<td>${c.trim()}</td>`).join("")}</tr>`;
      })
      .replace(/\n\n/g, "<br><br>")
      .replace(/\n/g, "<br>");
  }

  function formatSize(bytes) {
    if (bytes < 1024) return `${bytes}B`;
    if (bytes < 1048576) return `${(bytes/1024).toFixed(1)}KB`;
    return `${(bytes/1048576).toFixed(1)}MB`;
  }

  function onKeyDown(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // 自动调整 textarea 高度
  userInput.addEventListener("input", () => {
    userInput.style.height = "auto";
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + "px";
  });
</script>
</body>
</html>
