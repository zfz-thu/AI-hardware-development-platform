<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>被动放电 WCCA 分析</title>
  <style>
    :root {
      --primary: #1e3a8a;
      --primary-light: #2563eb;
      --bg: #eef2fb;
      --card-bg: #fff;
      --glass: rgba(255,255,255,0.55);
      --glass-strong: rgba(255,255,255,0.72);
      --glass-border: rgba(255,255,255,0.7);
      --glow: rgba(37,99,235,0.35);
      --ring: rgba(37,99,235,0.18);
      --text: #222;
      --border: #e5e7eb;
      --expert-bg: #f0f4ff;
      --user-bg: #e8f5e9;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(50vw 50vw at 8% 4%, rgba(99,102,241,0.12), transparent 55%),
        radial-gradient(45vw 45vw at 96% 14%, rgba(56,189,248,0.10), transparent 55%),
        radial-gradient(48vw 48vw at 78% 99%, rgba(168,85,247,0.09), transparent 55%);
      background-attachment: fixed;
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== 顶栏 ===== */
    header {
      height: 56px;
      background: linear-gradient(100deg, #1e3a8a 0%, #2545b0 45%, #3b2f9e 100%);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 14px;
      flex-shrink: 0;
      box-shadow: 0 2px 20px rgba(30,58,138,0.35);
      border-bottom: 1px solid rgba(255,255,255,0.12);
      position: relative; z-index: 5;
    }
    header .logo {
      background: linear-gradient(90deg, #fff, #c7d2fe);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header .logo { font-size: 18px; font-weight: 700; }
    header .sep { color: rgba(255,255,255,0.3); }
    header .subtitle { font-size: 13px; opacity: 0.8; }
    .btn-back {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 13px;
      padding: 5px 12px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 6px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-back:hover { background: rgba(255,255,255,0.1); }
    .status-badge {
      margin-left: auto;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.15);
    }
    .status-badge.connected { background: #22c55e55; }

    /* ===== 主体布局：左边栏 + 右对话区 ===== */
    .page-body {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }
    /* 左边栏 */
    .sidebar {
      width: 380px;
      flex-shrink: 0;
      background: var(--glass);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border-right: 1px solid var(--glass-border);
      box-shadow: 1px 0 24px rgba(30,58,138,0.06);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .zone { padding: 16px; }
    .zone + .zone { border-top: 8px solid var(--bg); }
    .zone-title {
      font-size: 14px; font-weight: 700; color: var(--primary);
      display: flex; align-items: center; gap: 6px; margin-bottom: 12px;
    }
    /* 上传卡片 */
    .upload-card {
      position: relative; overflow: hidden;
      border: 1px solid rgba(37,99,235,0.25); border-radius: 14px;
      padding: 22px 14px; text-align: center; cursor: pointer; color: #4a5578;
      background: linear-gradient(135deg, rgba(255,255,255,0.65), rgba(238,242,251,0.45));
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), 0 4px 16px rgba(30,58,138,0.06);
      transition: transform 0.18s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }
    /* 扫光高光 */
    .upload-card::before {
      content: ""; position: absolute; top: 0; left: -130%; width: 60%; height: 100%;
      background: linear-gradient(100deg, transparent, rgba(255,255,255,0.55), transparent);
      transform: skewX(-18deg); transition: left 0.6s ease; pointer-events: none;
    }
    .upload-card:hover {
      transform: translateY(-2px);
      border-color: var(--primary-light);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 0 0 4px var(--ring), 0 10px 28px rgba(37,99,235,0.18);
    }
    .upload-card:hover::before { left: 130%; }
    .upload-card:active { transform: translateY(0) scale(0.99); }
    .upload-card .up-icon { font-size: 26px; filter: drop-shadow(0 2px 6px var(--glow)); }
    .upload-card .up-text { font-size: 13px; margin-top: 6px; }
    .upload-card .up-hint { font-size: 11px; color: #aaa; margin-top: 4px; }
    /* 已上传列表 */
    .file-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
    .file-row {
      display: flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(238,242,251,0.5));
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      border: 1px solid var(--glass-border); border-radius: 10px;
      box-shadow: 0 2px 10px rgba(30,58,138,0.05);
      padding: 9px 11px; font-size: 12px;
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .file-row:hover { transform: translateX(2px); box-shadow: 0 4px 14px rgba(37,99,235,0.12); }
    .file-row .f-icon { font-size: 16px; flex-shrink: 0; }
    .file-row .f-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-row .f-tag {
      font-size: 10px; padding: 1px 7px; border-radius: 8px;
      background: #dbe4ff; color: var(--primary); flex-shrink: 0;
    }
    .file-row .f-ok { color: #22c55e; flex-shrink: 0; }
    /* datasheet 区 */
    .ds-empty {
      font-size: 12px; color: #999; line-height: 1.6;
      background: #fafbff; border: 1px dashed #e3e8f5; border-radius: 8px;
      padding: 16px 12px; text-align: center;
    }
    .ds-list { display: flex; flex-direction: column; gap: 8px; }
    /* 右侧主列 */
    .main-col {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    /* 边栏顶部 Tab */
    .side-tabs {
      display: flex; flex-shrink: 0;
      border-bottom: 1px solid var(--border); background: #fafbff;
    }
    .side-tab {
      flex: 1; text-align: center; padding: 12px 8px; cursor: pointer;
      font-size: 13px; font-weight: 600; color: #889;
      border-bottom: 2px solid transparent; transition: all 0.15s; user-select: none;
    }
    .side-tab:hover { background: #f0f4ff; }
    .side-tab.active { color: var(--primary); border-bottom-color: var(--primary-light); background: rgba(255,255,255,0.6); box-shadow: 0 2px 12px -4px var(--glow); }
    .side-page { display: none; flex-direction: column; overflow-y: auto; flex: 1; }
    .side-page.active { display: flex; }
    /* 子分区(原理图/BOM 各一块) */
    .subzone { padding: 16px; }
    .subzone + .subzone { border-top: 8px solid var(--bg); }
    .subzone-title {
      font-size: 13px; font-weight: 700; color: var(--primary);
      display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
    }

    /* 聊天区域 */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: rgba(255,255,255,0.45);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    .chat-area .welcome {
      text-align: center;
      padding: 40px 20px;
      color: #888;
    }
    .chat-area .welcome .welcome-icon { font-size: 48px; margin-bottom: 12px; }

    /* 消息气泡 */
    .msg {
      max-width: 80%;
      display: flex;
      gap: 10px;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.expert { align-self: flex-start; }
    .msg .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .msg.expert .avatar { background: #dbe4ff; }
    .msg.user .avatar { background: #c8e6c9; }
    .msg .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
    }
    .msg.expert .bubble { background: linear-gradient(135deg, rgba(240,244,255,0.85), rgba(255,255,255,0.7)); border: 1px solid var(--glass-border); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); box-shadow: 0 3px 14px rgba(30,58,138,0.07); }
    .msg.user .bubble { background: linear-gradient(135deg, rgba(232,245,233,0.9), rgba(255,255,255,0.7)); border: 1px solid rgba(200,230,201,0.9); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); box-shadow: 0 3px 14px rgba(34,197,94,0.08); }
    .msg .bubble pre {
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 12px;
      margin: 8px 0;
    }
    .msg .bubble code { font-size: 12px; }

    /* 文件上传气泡 */
    .file-attachment {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      background: #fff;
      border: 1px dashed #ccc;
      margin-top: 6px;
      font-size: 13px;
    }

    /* 底部输入区 */
    .input-area {
      padding: 14px 24px;
      background: var(--glass-strong);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border-top: 1px solid var(--glass-border);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input-row textarea {
      flex: 1;
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 11px 15px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 120px;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      transition: border-color 0.2s, box-shadow 0.25s, background 0.2s;
    }
    .input-row textarea:focus {
      border-color: var(--primary-light);
      background: rgba(255,255,255,0.85);
      box-shadow: 0 0 0 4px var(--ring);
    }
    .btn-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn-icon:hover { background: #f5f5f5; }
    .btn-send {
      width: 46px; height: 46px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(37,99,235,0.4), inset 0 1px 0 rgba(255,255,255,0.4);
      transition: transform 0.15s, box-shadow 0.25s, filter 0.2s;
    }
    .btn-send:hover { transform: translateY(-1px) scale(1.05); box-shadow: 0 6px 20px rgba(37,99,235,0.55), inset 0 1px 0 rgba(255,255,255,0.5); }
    .btn-send:active { transform: scale(0.96); }
    .btn-send:disabled { background: #aab; box-shadow: none; cursor: not-allowed; transform: none; }
    .input-hint {
      font-size: 11px;
      color: #aaa;
      margin-top: 6px;
      text-align: center;
    }
    #file-input { display: none; }
    /* 隐藏所有原生文件选择框，只保留自定义玻璃上传卡片 */
    .sidebar input[type="file"] { display: none; }

    /* 打字指示器 */
    .typing-indicator {
      align-self: flex-start;
      display: flex;
      gap: 4px;
      padding: 10px 16px;
      background: var(--expert-bg);
      border-radius: 14px;
      border: 1px solid #d4ddf8;
    }
    .typing-indicator span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #a0b4e0;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* 响应式 */
    @media (max-width: 600px) {
      .msg { max-width: 92%; }
      header { padding: 0 12px; }
      .input-area { padding: 10px 12px; }
    }
    .dl-link { display: inline-block; margin-top: 8px; padding: 9px 18px;
      background: #2e9e5b; color: #fff; border-radius: 8px;
      text-decoration: none; font-weight: 600; font-size: 14px; }
    .dl-link:hover { background: #25884d; }
  </style>
</head>
<body>

<header>
  <a href="/agent/wcca-circuit" class="btn-back">← 返回电路选择</a>
  <span class="sep">|</span>
  <span class="logo">被动放电 WCCA 分析</span>
  <span class="subtitle">· 专家引导式分析</span>
  <span class="status-badge" id="status-badge">在线</span>
</header>

<div class="page-body">
  <!-- 左边栏：顶部 Tab 切换「材料上传」/「Datasheet」两页 -->
  <aside class="sidebar">
    <div class="side-tabs">
      <div class="side-tab active" id="tab-materials" onclick="switchSidePage('materials')">📁 材料上传</div>
      <div class="side-tab" id="tab-datasheet" onclick="switchSidePage('datasheet')">📄 Datasheet</div>
    </div>

    <!-- 材料上传页：原理图区 + BOM 区 -->
    <div class="side-page active" id="page-materials">
      <div class="subzone">
        <div class="subzone-title">📐 电路原理图</div>
        <div class="upload-card" onclick="document.getElementById('sch-input').click()">
          <div class="up-icon">⬆️</div>
          <div class="up-text">上传原理图</div>
          <div class="up-hint">JPG / PNG / PDF（可多次添加）</div>
        </div>
        <input type="file" id="sch-input" accept=".jpg,.jpeg,.png,.pdf" multiple onchange="uploadFile(this)">
        <div class="file-list" id="sch-list"></div>
      </div>
      <div class="subzone">
        <div class="subzone-title">📊 BOM 表</div>
        <div class="upload-card" onclick="document.getElementById('bom-input').click()">
          <div class="up-icon">⬆️</div>
          <div class="up-text">上传 BOM</div>
          <div class="up-hint">XLSX / XLS（可选，也可口述位号+MPN）</div>
        </div>
        <input type="file" id="bom-input" accept=".xlsx,.xls" multiple onchange="uploadFile(this)">
        <div class="file-list" id="bom-list"></div>
      </div>
    </div>

    <!-- Datasheet 页：上传 + 解析结果（解析能力后续接入）-->
    <div class="side-page" id="page-datasheet">
      <div class="subzone">
        <div class="subzone-title">📄 上传 Datasheet</div>
        <div class="upload-card" onclick="document.getElementById('ds-input').click()">
          <div class="up-icon">⬆️</div>
          <div class="up-text">上传器件 Datasheet</div>
          <div class="up-hint">PDF（用于提取关键参数）</div>
        </div>
        <input type="file" id="ds-input" accept=".pdf" multiple onchange="uploadDatasheet(this)">
        <div class="file-list" id="ds-file-list"></div>
      </div>
      <div class="subzone">
        <div class="subzone-title">🔍 关键参数切片</div>
        <div id="ds-container">
          <div class="ds-empty">上传 datasheet 后，这里会显示解析出的关键参数切片（TOL/TCR/额定功率/耐压等）。该能力开发中。</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- 右侧：对话区 + 输入区 -->
  <div class="main-col">
    <div class="chat-area" id="chat-area">
      <div class="welcome">
        <div class="welcome-icon">⚡</div>
        <p>正在连接 WCCA 专家…</p>
      </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="user-input" placeholder="输入消息… (Enter 发送, Shift+Enter 换行)" rows="2" onkeydown="onKeyDown(event)"></textarea>
        <button class="btn-send" id="btn-send" onclick="sendMessage()">➤</button>
      </div>
      <div class="input-hint">在左侧上传材料，专家会引导你完成分析</div>
    </div>
  </div>
</div>

<script>
  const chatArea = document.getElementById("chat-area");
  const userInput = document.getElementById("user-input");
  const btnSend = document.getElementById("btn-send");
  const statusBadge = document.getElementById("status-badge");
  let messages = [];  // API 格式的对话历史
  let isStreaming = false;
  let schematicPaths = [];  // 已上传原理图的服务器路径列表（支持多张）
  let bomPaths = [];        // 已上传 BOM 的服务器路径列表（可多个）

  // ===== 初始化：发送问候 =====
  (async function init() {
    messages = [{ role: "user", content: "你好" }];
    await streamExpertReply(messages);
  })();

  // ===== 发送消息 =====
  async function sendMessage() {
    if (isStreaming) return;
    const text = userInput.value.trim();
    if (!text) return;

    userInput.value = "";
    userInput.style.height = "auto";
    btnSend.disabled = true;

    // 显示用户消息
    appendMessage("user", text);
    messages.push({ role: "user", content: text });

    await streamExpertReply(messages);
    btnSend.disabled = false;
    userInput.focus();
  }

  // ===== 流式获取专家回复 =====
  async function streamExpertReply(msgs) {
    isStreaming = true;
    const typingEl = showTyping();

    try {
      const formData = new FormData();
      formData.append("messages", JSON.stringify(msgs));

      const resp = await fetch("/api/wcca/chat", {
        method: "POST",
        body: formData,
      });

      if (!resp.ok) {
        removeTyping(typingEl);
        appendMessage("expert", "⚠️ 服务暂时不可用，请稍后重试。");
        return;
      }

      // 创建专家回复气泡并流式更新
      const bubbleEl = createStreamingBubble();
      removeTyping(typingEl);

      let fullText = "";
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop() || "";

        for (const line of lines) {
          if (line.startsWith("data: ")) {
            const dataStr = line.slice(6);
            if (dataStr === "[DONE]") continue;
            try {
              const data = JSON.parse(dataStr);
              if (data.text) {
                fullText += data.text;
                bubbleEl.innerHTML = renderMarkdown(fullText);
                chatArea.scrollTop = chatArea.scrollHeight;
              }
            } catch (e) { /* skip bad JSON */ }
          }
        }
      }

      // 检查是否包含参数 JSON
      const paramsData = parseParamsFromText(fullText);
      if (paramsData && paramsData.ready) {
        messages.push({ role: "assistant", content: fullText });
        // 自动触发计算
        setTimeout(async () => {
          await generateReport(paramsData.params);
        }, 800);
      } else {
        messages.push({ role: "assistant", content: fullText });
      }
    } catch (e) {
      removeTyping(typingEl);
      appendMessage("expert", `⚠️ 连接失败: ${e.message}`);
    } finally {
      isStreaming = false;
    }
  }

  // ===== 文件上传（两阶段：先全部上传并显示，再逐张分析）=====
  async function uploadFile(input) {
    const files = Array.from(input.files || []);
    input.value = "";
    if (!files.length) return;

    // 阶段一：并行上传所有文件，左侧列表立即逐个显示；分析消息按原始顺序收集，先不发给专家。
    const note = files.length > 1
      ? appendMessage("expert", `\u23f3 正在上传 ${files.length} 个文件…`)
      : null;
    const slots = await Promise.all(files.map((file) => prepareOneFile(file)));
    if (note && note.parentNode) note.parentNode.removeChild(note);

    // 阶段二：按原始顺序，逐张把消息加入对话并请专家分析（一张一张来）。
    const ok = slots.filter(Boolean);
    if (files.length > 1) {
      appendMessage("expert", `\u2705 已收到 ${ok.length} 个文件，开始逐张分析…`);
    }
    for (const slot of ok) {
      for (const m of slot.messages) messages.push(m);
      for (const note2 of slot.notes) appendMessage("expert", note2);
      await streamExpertReply(messages);
    }
  }

  // 上传单个文件并把它登记到左侧列表；返回 {messages, notes} 供随后逐张分析。
  // 不在这里调用专家分析 —— 分析在 uploadFile 的阶段二串行进行。
  async function prepareOneFile(file) {
    if (!file) return null;
    const formData = new FormData();
    formData.append("file", file);
    appendMessage("user", `\ud83d\udcce 已上传: ${file.name} (${formatSize(file.size)})`);
    const out = { messages: [], notes: [] };
    try {
      const resp = await fetch("/api/wcca/upload", { method: "POST", body: formData });
      const result = await resp.json();

      if (result.summary && result.summary.columns) {
        const bomInfo = `[BOM 文件已上传: ${file.name}]\n解析结果: ${result.summary.rows} 行数据, 列: ${result.summary.columns.join(", ")}\n前几行预览:\n${JSON.stringify(result.summary.preview?.slice(0, 10), null, 2)}`;
        out.messages.push({ role: "user", content: bomInfo });
        if (result.path) bomPaths.push(result.path);
        addFileToList(file.name, "BOM");
        out.notes.push(`\u2705 已收到 BOM 文件「${file.name}」，共 ${result.summary.rows} 行。专家正在分析…`);
      } else if (file.name.match(/\.(jpg|jpeg|png)$/i)) {
        if (result.path) schematicPaths.push(result.path);
        addFileToList(file.name, "原理图");
        out.notes.push(`\u2705 已收到原理图「${file.name}」，专家正在查看…`);
        const mt = file.name.match(/\.png$/i) ? "image/png" : "image/jpeg";
        const b64 = await fileToBase64(file);
        out.messages.push({ role: "user", content: [
          { type: "image", source: { type: "base64", media_type: mt, data: b64 } },
          { type: "text", text: "这是被动放电电路的原理图。请你识别其拓扑结构（有几条支路、主放电电阻矩阵的串并联数、采样/分压支路的连接），用文字描述并与我确认。datasheet 参数无需你查，后台会自动处理。" }
        ] });
      } else if (file.name.match(/\.pdf$/i)) {
        if (result.path) schematicPaths.push(result.path);
        addFileToList(file.name, "原理图");
        out.notes.push(`\u2705 已收到原理图 PDF「${file.name}」，后台分析时会读取。`);
        out.messages.push({ role: "user", content: `[上传了原理图 PDF: ${file.name}]` });
      } else {
        out.messages.push({ role: "user", content: `[上传了文件: ${file.name}, ${formatSize(file.size)}]` });
      }
      return out;
    } catch (e) {
      appendMessage("expert", `\u26a0\ufe0f 文件上传失败: ${file.name} — ${e.message}`);
      return null;
    }
  }

  // ===== 执行 WCCA 计算 =====
  // ===== 调用 agent 生成完整 PDF 报告 =====
  async function generateReport(params) {
    // 原理图必需；BOM 可选（工程师可改为口述位号+MPN，后台据此联网查 datasheet）
    if (!schematicPaths.length) {
      appendMessage('expert', '⚠️ 还差电路原理图，请先上传原理图后再生成报告。');
      return;
    }
    const bubble = createStreamingBubble();
    const bodyEl = bubble.querySelector('.bubble') || bubble;
    const t0 = Date.now();
    statusBadge.textContent = '生成报告中…';
    const timer = setInterval(() => {
      const sec = Math.floor((Date.now() - t0) / 1000);
      bodyEl.innerHTML = renderMarkdown(`🛠️ 正在调用 WCCA 专家智能体生成完整报告… 已用时 ${sec} 秒

（自动识别原理图 + 解析 BOM + 最坏情况计算 + 编译 PDF，通常需要几分钟，请勿关闭页面）`);
      chatArea.scrollTop = chatArea.scrollHeight;
    }, 1000);
    try {
      const resp = await fetch('/api/wcca/run-agent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ schematic_paths: schematicPaths, bom_paths: bomPaths, params }),
      });
      const data = await resp.json();
      clearInterval(timer);
      if (resp.ok && data.ok) {
        const md = `## ✅ WCCA 报告已生成

报告已完成最坏情况分析并编译为 PDF。

<a class="dl-link" href="${data.download}" target="_blank">📄 下载 WCCA 报告 PDF</a>`;
        bodyEl.innerHTML = renderMarkdown(md);
        messages.push({ role: 'assistant', content: '[已生成 WCCA 报告 PDF]' });
        statusBadge.textContent = '报告已生成';
        statusBadge.classList.add('connected');
      } else {
        const err = data.error || data.detail || `HTTP ${resp.status}`;
        bodyEl.innerHTML = renderMarkdown(`⚠️ 报告生成失败：${err}`);
        statusBadge.textContent = '生成失败';
      }
    } catch (e) {
      clearInterval(timer);
      bodyEl.innerHTML = renderMarkdown(`⚠️ 报告请求失败：${e.message}`);
      statusBadge.textContent = '生成失败';
    }
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  async function runCalculation(params) {
    try {
      statusBadge.textContent = "计算中…";
      const resp = await fetch("/api/wcca/calculate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(params),
      });
      const result = await resp.json();

      if (!resp.ok) {
        const msg = result.detail || result.error || `HTTP ${resp.status}`;
        appendMessage("expert", `⚠️ 计算出错: ${msg}`);
        return;
      }

      // 格式化结果
      let report = "## 📊 WCCA 计算结果\n\n";
      report += `**母线电压**: ${result.V_HVDC_typ}V | **安全电压**: ${result.V_Safety}V | **温度范围**: ${result.T_min}°C ~ ${result.T_max}°C\n`;
      report += `**电容反推值**: ${(result.Cap_HVDC_typ * 1e6).toFixed(3)} μF | **ln(Vs/Vh)**: ${result.ln_ratio}\n\n`;

      for (const cr of result.config_results) {
        const passIcon = (cr.t_passed && cr.P_passed) ? "✅" : "❌";
        report += `### ${passIcon} ${cr.config_name}\n`;
        report += `| 项目 | 值 | 判定 |\n|------|-----|------|\n`;
        report += `| 放电时间 (典型) | **${cr.t_discharge_typ}s** | — |\n`;
        report += `| 放电时间 (最坏) | **${cr.t_discharge_max}s** | ${cr.t_passed ? "✅ ≤120s" : "❌ >120s"} |\n`;
        report += `| 单颗功耗 (最坏) | **${cr.P_single_max}W** | ${cr.P_passed ? `✅ <${cr.P_derate_target}W` : `❌ ≥${cr.P_derate_target}W`} |\n`;
        report += `| 总功耗 | ${cr.P_all_max}W | — |\n`;
        report += `| 等效并联电阻 (max) | ${(cr.R_parallel_max/1000).toFixed(2)}kΩ | — |\n\n`;
      }

      report += result.all_t_pass && result.all_P_pass
        ? "## ✅ 综合结论: 全部通过"
        : "## ⚠️ 综合结论: 存在不通过项，请检查参数";

      appendMessage("expert", report);
      messages.push({ role: "assistant", content: report });
      statusBadge.textContent = "计算完成";
      statusBadge.classList.add("connected");
    } catch (e) {
      appendMessage("expert", `⚠️ 计算请求失败: ${e.message}`);
    }
  }

  // ===== UI 工具函数 =====
  function appendMessage(role, text) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    const avatar = role === "expert" ? "👨‍🔬" : "👤";
    div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${renderMarkdown(text)}</div>`;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return div;
  }

  function showTyping() {
    const el = document.createElement("div");
    el.className = "msg expert";
    el.innerHTML = `<div class="avatar">👨‍🔬</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
    chatArea.appendChild(el);
    chatArea.scrollTop = chatArea.scrollHeight;
    return el;
  }

  function removeTyping(el) { if (el && el.parentNode) el.remove(); }

  function createStreamingBubble() {
    const div = document.createElement("div");
    div.className = "msg expert";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    div.innerHTML = '<div class="avatar">👨‍🔬</div>';
    div.appendChild(bubble);
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return bubble;
  }

  function parseParamsFromText(text) {
    const m = text.match(/```json\s*([\s\S]*?)\s*```/);
    if (!m) return null;
    try { return JSON.parse(m[1]); } catch (e) { return null; }
  }

  function renderMarkdown(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.*?)\*/g, "<em>$1</em>")
      .replace(/^### (.*$)/gm, "<h4>$1</h4>")
      .replace(/^## (.*$)/gm, "<h3>$1</h3>")
      .replace(/^# (.*$)/gm, "<h2>$1</h2>")
      .replace(/\|(.+)\|/g, (match) => {
        const cells = match.split("|").filter(c => c.trim());
        if (cells.every(c => c.match(/^[-:]+$/))) return ""; // skip separator
        const tag = match.includes("---") ? "" : "";
        return `<tr>${cells.map(c => match === text.split("\n").find(l => l.includes("|") && !l.match(/^[-| ]+$/)) ? `<th>${c.trim()}</th>` : `<td>${c.trim()}</td>`).join("")}</tr>`;
      })
      .replace(/\n\n/g, "<br><br>")
      .replace(/\n/g, "<br>");
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const s = reader.result;
        const comma = s.indexOf(',');
        resolve(comma >= 0 ? s.slice(comma + 1) : s);
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ===== 左边栏：Tab 切换 =====
  function switchSidePage(which) {
    const isMat = which === "materials";
    document.getElementById("tab-materials").classList.toggle("active", isMat);
    document.getElementById("tab-datasheet").classList.toggle("active", !isMat);
    document.getElementById("page-materials").classList.toggle("active", isMat);
    document.getElementById("page-datasheet").classList.toggle("active", !isMat);
  }

  // ===== 左边栏：已上传材料列表（按类型分流到原理图/BOM 列表）=====
  function addFileToList(name, tag) {
    const listId = tag === "BOM" ? "bom-list" : "sch-list";
    const list = document.getElementById(listId);
    if (!list) return;
    const icon = tag === "BOM" ? "📊" : "📐";
    const row = document.createElement("div");
    row.className = "file-row";
    row.innerHTML = '<span class="f-icon">' + icon + '</span>' +
      '<span class="f-name" title="' + name + '">' + name + '</span>' +
      '<span class="f-tag">' + tag + '</span>' +
      '<span class="f-ok">✓</span>';
    list.appendChild(row);
  }

  // ===== Datasheet 页：上传（解析能力后续接入，先做列表）=====
  async function uploadDatasheet(input) {
    const files = Array.from(input.files || []);
    for (const file of files) {
      const fd = new FormData();
      fd.append("file", file);
      try {
        await fetch("/api/wcca/upload", { method: "POST", body: fd });
      } catch (e) { /* ignore upload error for now */ }
      const list = document.getElementById("ds-file-list");
      if (list) {
        const row = document.createElement("div");
        row.className = "file-row";
        row.innerHTML = '<span class="f-icon">📄</span>' +
          '<span class="f-name" title="' + file.name + '">' + file.name + '</span>' +
          '<span class="f-tag">PDF</span><span class="f-ok">✓</span>';
        list.appendChild(row);
      }
    }
    input.value = "";
    // TODO: 调用后端/agent 解析 datasheet -> renderDatasheets(slices)
  }

  // ===== 左边栏：Datasheet 区渲染（占位 hook，后台能力就绪后填充）=====
  function renderDatasheets(items) {
    const c = document.getElementById("ds-container");
    if (!c) return;
    if (!items || !items.length) {
      c.innerHTML = '<div class="ds-empty">生成报告后，这里会显示器件 datasheet 与关键参数切片。</div>';
      return;
    }
    // 后续实现：渲染每个 MPN 的 datasheet 下载链接 + 关键参数切片
    const rows = items.map(function(it){
      return '<div class="file-row"><span class="f-icon">📄</span>' +
        '<span class="f-name">' + (it.mpn || it.name || "") + '</span></div>';
    }).join("");
    c.innerHTML = '<div class="ds-list">' + rows + '</div>';
  }

  function formatSize(bytes) {
    if (bytes < 1024) return `${bytes}B`;
    if (bytes < 1048576) return `${(bytes/1024).toFixed(1)}KB`;
    return `${(bytes/1048576).toFixed(1)}MB`;
  }

  function onKeyDown(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // 自动调整 textarea 高度
  userInput.addEventListener("input", () => {
    userInput.style.height = "auto";
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + "px";
  });
</script>
